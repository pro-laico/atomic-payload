packages:
  - 'packages/*'
  - 'templates/*'
  - 'examples/*'
  - 'tools/*'
  - 'docs'
allowBuilds:
  '@swc/core': true
  core-js: true
  esbuild: true
  # No binary download — the seed test points mongodb-memory-server at the local
  # mongod via `systemBinary` (see tools/test-helpers/src/mongo.ts).
  mongodb-memory-server: false
  protobufjs: true
  sharp: true
  unrs-resolver: true
packageExtensions:
  next:
    dependencies:
      '@babel/core': 7.29.0
